# RENAR dev environment — Astro hot reload on port 4321.
# Layout mirrors Dockerfile (/repo root, /repo/site working dir) so
# sync-site-content.js resolves repo root correctly:
#   __dirname=/repo/scripts → root=/repo → reads /repo/{section},
#   writes /repo/site/src/content/{section}/{lang}/.
services:
  dev:
    image: node:22-alpine
    working_dir: /repo/site
    volumes:
      - ./site:/repo/site
      - ./scripts:/repo/scripts:ro
      - ./standard:/repo/standard:ro
      - ./guide:/repo/guide:ro
      - ./reference:/repo/reference:ro
      - ./core:/repo/core:ro
      - renar_modules:/repo/site/node_modules
    ports:
      - "4321:4321"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development

volumes:
  renar_modules:
