# Content-negotiation: предпочитает ли клиент markdown (Accept: text/markdown).
map $http_accept $prefers_md {
    default 0;
    "~*text/markdown" 1;
}

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Keep redirect Location relative so upstream HTTPS scheme is preserved.
    # Behind a TLS-terminating reverse proxy, absolute redirects downgrade to http://.
    absolute_redirect off;

    # Custom 404 page (Astro provides /404.html at the root).
    error_page 404 /404.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Agent-discovery Link header — указывает агентам на llms.txt / полнотекст / sitemap.
    add_header Link "<https://renar.tech/llms.txt>; rel=\"alternate\"; type=\"text/plain\"; title=\"llms.txt\", <https://renar.tech/llms-full.txt>; rel=\"alternate\"; type=\"text/plain\"; title=\"llms-full.txt\", <https://renar.tech/sitemap-index.xml>; rel=\"sitemap\"; type=\"application/xml\"" always;
    # CSP allows fonts.googleapis (Inter, JetBrains Mono — Material default), GA/Yandex,
    # and inline scripts/styles required by Astro hydration + Material theme runtime.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://mc.yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://mc.yandex.ru data:; connect-src 'self' https://www.google-analytics.com https://mc.yandex.ru https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com;" always;

    # Root: 301 to /ru/ (Astro landing default locale).
    location = / {
        return 301 /ru/;
    }

    # Markdown content-negotiation: для страниц глав /docs/<section>/<slug>/
    # при Accept: text/markdown отдаём исходный .md из /md/ (см. sync-docs-md.js).
    # Обычный Accept (text/html) → HTML как прежде. Отсутствие .md → 404.
    location ~ ^/docs/(standard|guide|reference|core)/([^/]+)/?$ {
        # Захват в самом rewrite: '^' сбросил бы $1/$2 из location-regex → /md//.md → 404.
        if ($prefers_md) {
            rewrite ^/docs/(.+?)/?$ /md/$1.md last;
        }
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Зеркало исходных markdown-глав (цель content-negotiation).
    location /md/ {
        default_type text/markdown;
        charset utf-8;
    }

    # MkDocs Material docs at /docs/* (built tree copied from stage 2).
    # Material's HTML uses relative URLs, so try_files works directly.
    location /docs/ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Astro static assets — cache 1 year (immutable hashed filenames).
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # MkDocs assets (CSS/JS/fonts under /docs/assets/).
    location /docs/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Astro i18n routes — Russian only in v1.0-draft.
    location /ru/ {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Text files — UTF-8 charset
    location ~* \.(txt|json)$ {
        charset utf-8;
        charset_types text/plain application/json;
    }

    # Discovery-метаданные агентов: /.well-known/ (например agent.json).
    # ^~ имеет приоритет над regex-правилом deny ниже, поэтому файлы здесь отдаются.
    location ^~ /.well-known/ {
        charset utf-8;
        try_files $uri =404;
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # Default fallback — Astro routes outside /docs/ and /ru/ (e.g. /sitemap.xml).
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
