stages:
  - build
  - deploy

variables:
  IMAGE: ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
  IMAGE_LATEST: ${CI_REGISTRY_IMAGE}:latest
  # BuildKit enables Dockerfile `# syntax=` directives and RUN --mount=type=cache.
  DOCKER_BUILDKIT: "1"

build:
  stage: build
  tags: [common]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # --pull keeps node/nginx base images fresh; cache-from reuses the previous
    # :latest layers so unchanged steps (notably npm ci) hit the Docker cache.
    - docker pull $IMAGE_LATEST || true
    - >-
      docker build
      --pull
      --cache-from $IMAGE_LATEST
      --build-arg BUILDKIT_INLINE_CACHE=1
      -t $IMAGE -t $IMAGE_LATEST .
    - docker push $IMAGE
    - docker push $IMAGE_LATEST
  only:
    - main

deploy:
  stage: deploy
  tags: [docker-services]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker pull $IMAGE
    - docker stop renar-site 2>/dev/null || true
    - docker rm renar-site 2>/dev/null || true
    - >-
      docker run -d
      --name renar-site
      --restart unless-stopped
      -p 8800:80
      $IMAGE
    - sleep 3
    - docker ps | grep renar-site
    - 'curl -sf http://localhost:8800/ru/ | head -5 || echo "WARNING: health check failed"'
  environment:
    name: production
  only:
    - main
